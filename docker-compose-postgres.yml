services:
  db_server:
    image: postgres
    container_name: 'propel-test-postgres'
    restart: always
    environment:
      POSTGRES_PASSWORD: 'propel'
      POSTGRES_USER: 'propel'
      PGUSER: 'propel'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      retries: 5
    networks:
      - propel-test-net
